name: Clean old Telegram media & archive (every 3 days Iran time)

on:
  schedule:
    # 20:30 UTC = 00:00 Tehran (UTC+3:30)
    - cron: "30 20 * * *"
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jdatetime

      - name: Decide and clean
        run: |
          python << 'EOF'
          import jdatetime, shutil
          from datetime import datetime, date
          from pathlib import Path
          from zoneinfo import ZoneInfo

          TEHRAN = ZoneInfo("Asia/Tehran")
          state_file = Path("telegram/last_clean_date.txt")
          content_dir = Path("telegram/content")
          md_file = Path("telegram.md")

          # Today in Tehran
          now_tehran = datetime.now(ZoneInfo("UTC")).astimezone(TEHRAN)
          today_jalali = jdatetime.date.fromgregorian(date=now_tehran.date())
          today_str = today_jalali.strftime("%Y-%m-%d")

          if not state_file.exists():
              print("📅 First run: creating date file, no cleaning.")
              state_file.parent.mkdir(parents=True, exist_ok=True)
              state_file.write_text(today_str)
              print(f"📝 Initial clean date = {today_str}")
              exit(0)

          last_str = state_file.read_text().strip()
          last_parts = list(map(int, last_str.split("-")))
          last_date = jdatetime.date(*last_parts)
          next_clean = last_date + jdatetime.timedelta(days=3)

          print(f"Last clean: {last_str} → next clean on: {next_clean}")

          if today_jalali >= next_clean:
              if content_dir.exists():
                  shutil.rmtree(content_dir)
                  print("🧹 Deleted telegram/content/")
              if md_file.exists():
                  md_file.unlink()
                  print("🧹 Deleted telegram.md")
              else:
                  print("ℹ️ telegram.md already missing.")
              state_file.write_text(today_str)
              print(f"📝 Updated clean date to {today_str}")
          else:
              print("⏭️ Not yet time to clean (less than 3 days).")
          EOF

      - name: Commit and push if changes
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 524288000

          git add telegram/content/ telegram.md telegram/last_clean_date.txt

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "🧹 Clean Telegram media & archive (3-day cycle) [skip ci]"

          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "Push attempt $i..."
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              echo "Push succeeded."
              break
            else
              echo "Push failed."
              [ $i -lt $RETRIES ] && sleep 3 || exit 1
            fi
          done
